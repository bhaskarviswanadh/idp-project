apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: idp-app
  template:
    metadata:
      labels:
        app: idp-app
    spec:
      containers:
      - name: idp-container
        image: idp-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: idp-service
spec:
  type: NodePort
  selector:
    app: idp-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30007